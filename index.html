<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقعك اللذوذ</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f, #0f0f1a);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* تأثير النجوم المتساقطة */
        .star {
            position: absolute;
            top: -20px;
            color: #ffd700;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear forwards;
            z-index: 999;
        }

        @keyframes fall {
            to {
                transform: translateY(105vh) rotate(360deg);
            }
        }

        /* الشريط العلوي للرصيد */
        #top-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            left: 20px;
            display: none;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        #balance-bar {
            background: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 18px;
            font-weight: bold;
        }

        #balance-amount {
            color: #4caf50;
        }

        .btn-logout {
            background: rgba(255, 65, 108, 0.2);
            color: #ff416c;
            border: 1px solid #ff416c;
            padding: 8px 15px;
            font-size: 14px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-logout:hover {
            background: #ff416c;
            color: white;
        }

        /* زر الأدمن السري المخفي */
        #secret-admin-btn {
            width: 25px;
            height: 25px;
            background: transparent;
            cursor: pointer;
            margin-right: 15px;
        }

        /* الحاويات والشاشات */
        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
            z-index: 10;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .container.active {
            display: block !important;
        }

        h1, h2 {
            margin-bottom: 25px;
            line-height: 1.5;
        }

        p {
            margin-bottom: 20px;
            font-size: 18px;
        }

        /* الأزرار */
        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(255, 65, 108, 0.4);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255, 65, 108, 0.6);
        }

        .btn-secondary {
            background: linear-gradient(45deg, #4776e6, #8e54e9);
            box-shadow: 0 4px 15px rgba(71, 118, 230, 0.4);
        }

        .btn-admin {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            box-shadow: 0 4px 15px rgba(56, 239, 125, 0.4);
        }

        /* الفورم */
        .form-group {
            margin-bottom: 20px;
            text-align: right;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4);
            color: white;
            font-size: 16px;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: #ff416c;
        }

        /* شبكة الألعاب */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .game-card {
            background: rgba(255,255,255,0.1);
            padding: 25px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .game-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            border-color: #ffd700;
        }

        .game-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }

        /* منطقة الطيارة */
        #plane-game-area {
            background: #050510;
            border-radius: 10px;
            height: 200px;
            position: relative;
            overflow: hidden;
            margin-bottom: 20px;
            border: 2px solid #333;
        }

        #plane {
            position: absolute;
            bottom: 10px;
            left: 10px;
            font-size: 35px;
        }

        #multiplier {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 32px;
            font-weight: bold;
            color: #ffd700;
        }

        #game-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
            color: #ff416c;
            display: none;
        }
    </style>
</head>
<body>

    <!-- الشريط العلوي -->
    <div id="top-bar">
        <button class="btn-logout" onclick="logout()">تسجيل خروج 🚪</button>
        <div style="display: flex; align-items: center;">
            <!-- المربع الشفاف المخفي مخصص للأدمن هنا -->
            <div id="secret-admin-btn" onclick="openAdminPanel()"></div>
            <div id="balance-bar">رصيدك: <span id="balance-amount">0</span> جنيه</div>
        </div>
    </div>

    <!-- 1. الشاشة الافتتاحية -->
    <div id="screen-welcome" class="container">
        <h1>منور يسطا في موقعك اللذوذ ✨</h1>
        <p>هتلعب ولا تضرب البوز？ 🤔</p>
        <div class="btn-group">
            <button onclick="choosePlay()">هلعب 🎮</button>
            <button class="btn-secondary" onclick="chooseBout()">هضرب البوز 😒</button>
        </div>
    </div>

    <!-- 2. شاشة ضرب البوز -->
    <div id="screen-bout" class="container">
        <h1>العب يسطا وهروق عليك 😉</h1>
        <div class="btn-group">
            <button onclick="goToLogin()">يلا بينا 🚀</button>
        </div>
    </div>

    <!-- 3. شاشة الدخول -->
    <div id="screen-login" class="container">
        <h2 id="login-title">إنشاء حساب جديد</h2>
        <p style="font-size: 13px; color: #aaa; margin-bottom: 15px;">مسموح بحساب واحد فقط في هذا المتصفح!</p>
        <div class="form-group">
            <label>إسم المستخدم:</label>
            <input type="text" id="username" placeholder="اكتب اسمك هنا">
        </div>
        <div class="form-group">
            <label>كلمة المرور:</label>
            <input type="password" id="password" placeholder="******">
        </div>
        <button style="width: 100%;" id="btn-auth" onclick="handleAuth()">سجل وخود الـ 10 جنيه 🎁</button>
    </div>

    <!-- 4. قائمة الألعاب -->
    <div id="screen-games" class="container">
        <h2>قائمة الألعاب اللذوذة 🕹️</h2>
        <div class="games-grid">
            <div class="game-card" onclick="openPlaneGame()">
                <div class="game-icon">✈️</div>
                <h3>لعبة الطيارة</h3>
            </div>
            <div class="game-card" style="opacity: 0.4; cursor: not-allowed;">
                <div class="game-icon">🎰</div>
                <h3>قريباً..</h3>
            </div>
        </div>
    </div>

    <!-- 5. لعبة الطيارة -->
    <div id="screen-plane-game" class="container" style="max-width: 600px;">
        <h2>لعبة طيارة ون اسبت ✈️</h2>
        <div id="plane-game-area">
            <div id="multiplier">1.00x</div>
            <div id="plane">✈️</div>
            <div id="game-status">طارت الطيارة! 💥</div>
        </div>
        <div class="form-group" style="text-align: center;">
            <label>قيمة الرهان (الحد الأدنى 8 جنيه):</label>
            <input type="number" id="bet-amount" value="8" style="max-width: 200px; margin: 0 auto 10px;">
        </div>
        <div class="btn-group">
            <button id="btn-start-game" onclick="startPlaneGame()">ابدأ الرهان 🚀</button>
            <button id="btn-cashout" class="btn-secondary" onclick="cashout()" disabled>كاش آوت 💰</button>
        </div>
        <button style="margin-top: 20px; background: #333;" onclick="showGamesList()">رجوع للألعاب ⬅️</button>
    </div>

    <!-- 6. لوحة الأدمن لشحن الرصيد -->
    <div id="screen-admin" class="container">
        <h2>👑 لوحة تحكم الأدمن السري 👑</h2>
        <div class="form-group">
            <label>إسم المستخدم المراد شحنه بالظبط:</label>
            <input type="text" id="admin-target-user" placeholder="اكتب اليوزر نيم هنا">
        </div>
        <div class="form-group">
            <label>المبلغ المراد إضافته (بالجنيه):</label>
            <input type="number" id="admin-amount-to-add" placeholder="مثال: 50">
        </div>
        <button class="btn-admin" style="width: 100%; margin-bottom: 15px;" onclick="addMoneyAsAdmin()">شحن الرصيد فوراً 💸</button>
        <button style="background: #333; width: 100%;" onclick="closeAdminPanelAndReturn()">رجوع ⬅️</button>
    </div>

    <script>
        let balance = 0;
        let isGameRunning = false;
        let gameInterval;
        let currentMultiplier = 1.00;
        let crashPoint = 0;
        const ADMIN_PASSWORD = "admin123"; 
        let previousScreen = "screen-games";

        window.onload = function() {
            let starInterval = setInterval(createStar, 60);
            setTimeout(() => { clearInterval(starInterval); }, 3000);
            checkUserSession();
        };

        function createStar() {
            const star = document.createElement('div');
            star.classList.add('star');
            star.innerText = '⭐';
            star.style.left = Math.random() * 100 + 'vw';
            star.style.animationDuration = Math.random() * 1.5 + 1.5 + 's';
            star.style.fontSize = Math.random() * 12 + 12 + 'px';
            document.body.appendChild(star);
            setTimeout(() => { star.remove(); }, 3000);
        }

        function showScreen(screenId) {
            const containers = document.querySelectorAll('.container');
            containers.forEach(c => c.classList.remove('active'));
            const target = document.getElementById(screenId);
            if(target) target.classList.add('active');
        }

        function checkUserSession() {
            try {
                const isLoggedIn = localStorage.getItem('isLoggedIn');
                const registeredUser = localStorage.getItem('registeredUser');

                if (isLoggedIn === 'true' && registeredUser) {
                    const savedData = JSON.parse(registeredUser);
                    balance = parseFloat(savedData.balance) || 10;
                    updateBalanceDisplay();
                    document.getElementById('top-bar').style.display = 'flex';
                    showScreen('screen-games');
                } else {
                    if (registeredUser) {
                        document.getElementById('login-title').innerText = "تسجيل الدخول للحساب";
                        document.getElementById('btn-auth').innerText = "دخول";
                    }
                    showScreen('screen-welcome');
                }
            } catch (e) {
                showScreen('screen-welcome');
            }
        }

        function choosePlay() { showScreen('screen-login'); }
        function chooseBout() { showScreen('screen-bout'); }
        function goToLogin() { showScreen('screen-login'); }

        function handleAuth() {
            const userInp = document.getElementById('username').value.trim();
            const passInp = document.getElementById('password').value.trim();

            if(!userInp || !passInp) {
                alert("اكتب البيانات الأول يخويا! ⚠️");
                return;
            }

            const existingUser = localStorage.getItem('registeredUser');

            if (!existingUser) {
                const userData = { username: userInp, password: passInp, balance: 10 };
                localStorage.setItem('registeredUser', JSON.stringify(userData));
                localStorage.setItem('isLoggedIn', 'true');
                balance = 10;
                alert("مبروك الحساب الجديد وخدت 10 جنيه هدية! 🎉");
            } else {
                const savedData = JSON.parse(existingUser);
                if (savedData.username === userInp && savedData.password === passInp) {
                    balance = parseFloat(savedData.balance) || 10;
                    localStorage.setItem('isLoggedIn', 'true');
                    alert(`أهلاً بعودتك يا ${userInp}! 👋`);
                } else {
                    alert("⚠️ خطأ: البيانات مش مطابقة، ومينفعش تعمل أكتر من حساب!");
                    return;
                }
            }

            updateBalanceDisplay();
            document.getElementById('top-bar').style.display = 'flex';
            showScreen('screen-games');
        }

        function updateBalanceDisplay() {
            document.getElementById('balance-amount').innerText = balance.toFixed(2);
            try {
                let userData = JSON.parse(localStorage.getItem('registeredUser'));
                if(userData) {
                    userData.balance = balance;
                    localStorage.setItem('registeredUser', JSON.stringify(userData));
                }
            } catch(e){}
        }

        function openAdminPanel() {
            if(isGameRunning) return alert("إقفل الجيم الشغال الأول يسطا!");
            const pass = prompt("اكتب الباسورد السري للأدمن:");
            if (pass === ADMIN_PASSWORD) {
                const activeContainer = document.querySelector('.container.active');
                if(activeContainer) previousScreen = activeContainer.id;
                showScreen('screen-admin');
            } else if (pass !== null) {
                alert("الباسورد غلط يا صاحبي! 🤫");
            }
        }

        /* دالة الشحن المصلحة تماماً بنسبة 100% للتأكد من قراءة البيانات بالشكل الصحيح */
        function addMoneyAsAdmin() {
            const targetUser = document.getElementById('admin-target-user').value.trim();
            const amountToAdd = parseFloat(document.getElementById('admin-amount-to-add').value);

            if(!targetUser || isNaN(amountToAdd) || amountToAdd <= 0) {
                alert("أدخل اسم يوزر ومبلغ صحيح! ⚠️");
                return;
            }

            const existingUser = localStorage.getItem('registeredUser');
            if(!existingUser) {
                alert("مفيش حسابات مسجلة حالياً! ❌");
                return;
            }

            let userData = JSON.parse(existingUser);
            
            // المقارنة الآن تتم بين النصوص بشكل مباشر وصحيح لتفادي مشاكل الحفظ
            if(String(userData.username).toLowerCase() === String(targetUser).toLowerCase()) {
                userData.balance = (parseFloat(userData.balance) || 0) + amountToAdd;
                localStorage.setItem('registeredUser', JSON.stringify(userData));
                
                // تحديث الرصيد الحالي لو الأدمن بيشحن لنفسه وهو فاتح الحساب
                balance = userData.balance;
                updateBalanceDisplay();
                
                alert(`🎯 تم بنجاح إضافة ${amountToAdd} جنيه لحساب [${targetUser}]`);
                document.getElementById('admin-target-user').value = "";
                document.getElementById('admin-amount-to-add').value = "";
            } else {
                alert(`❌ المستخدم [${targetUser}] مش موجود، اتأكد إن الحروف والاسم صح!`);
            }
        }

        function closeAdminPanelAndReturn() { showScreen(previousScreen); }

        function logout() {
            if(isGameRunning) return alert("إقفل الجيم الأول!");
            localStorage.setItem('isLoggedIn', 'false'); 
            document.getElementById('top-bar').style.display = 'none';
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
            document.getElementById('login-title').innerText = "تسجيل الدخول للحساب";
            document.getElementById('btn-auth').innerText = "دخول";
            showScreen('screen-welcome');
        }

        function showGamesList() {
            if(isGameRunning) return alert("إقفل الجيم الأول يسطا!");
            showScreen('screen-games');
        }

        function openPlaneGame() {
            showScreen('screen-plane-game');
            resetPlaneUI();
        }

        function resetPlaneUI() {
            document.getElementById('plane').style.bottom = "10px";
            document.getElementById('plane').style.left = "10px";
            document.getElementById('multiplier').innerText = "1.00x";
            document.getElementById('multiplier').style.color = "#ffd700";
            document.getElementById('game-status').style.display = "none";
            document.getElementById('btn-start-game').disabled = false;
            document.getElementById('btn-cashout').disabled = true;
        }

        function startPlaneGame() {
            const betInput = document.getElementById('bet-amount');
            let bet = parseFloat(betInput.value);

            if (bet < 8 || isNaN(bet)) {
                alert("الحد الادني للرهان 8 جنيه يخويا متكررهاش تاني 🤫");
                return;
            }

            if (bet > balance) {
                alert("معكش فلوس تكفي الرهان ده يسطا! 💸");
                return;
            }

            balance -= bet;
            updateBalanceDisplay();

            isGameRunning = true;
            currentMultiplier = 1.00;
            crashPoint = (Math.random() * 4 + 1).toFixed(2); 

            document.getElementById('btn-start-game').disabled = true;
            document.getElementById('btn-cashout').disabled = false;
            document.getElementById('game-status').style.display = "none";
            document.getElementById('multiplier').style.color = "#ffd700";

            let planeX = 10;
            let planeY = 10;

            gameInterval = setInterval(() => {
                currentMultiplier += 0.04;
                document.getElementById('multiplier').innerText = currentMultiplier.toFixed(2) + "x";

                planeX += 1.5;
                planeY += 0.8;
                if(planeX < 80) document.getElementById('plane').style.left = planeX + "%";
                if(planeY < 70) document.getElementById('plane').style.bottom = planeY + "%";

                if (currentMultiplier >= crashPoint) {
                    endGame(false, bet);
                }
            }, 100);
        }

        function cashout() {
            if (!isGameRunning) return;
            const bet = parseFloat(document.getElementById('bet-amount').value);
            endGame(true, bet);
        }

        function endGame(isWin, bet) {
            clearInterval(gameInterval);
            isGameRunning = false;
            document.getElementById('btn-cashout').disabled = true;
            document.getElementById('btn-start-game').disabled = false;

            if (isWin) {
                let winAmount = bet * currentMultiplier;
                balance += winAmount;
                updateBalanceDisplay();
                document.getElementById('multiplier').style.color = "#4caf50";
                alert(`عاش يا وحش! كسبت ${winAmount.toFixed(2)} جنيه 💰`);
                resetPlaneUI();
            } else {
                document.getElementById('multiplier').innerText = "💥 انفجرت عند " + crashPoint + "x";
                document.getElementById('multiplier').style.color = "#ff416c";
                document.getElementById('game-status').style.display = "block";
                alert("الطيارة طارت والفلوس راحت عليك! 🛩️💨");
            }
        }
    </script>
</body>
</html>
