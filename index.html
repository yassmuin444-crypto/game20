<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحبا بك في موقعك اللذوذ 👑🚀</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        /* (نفس الستايل بتاعك كما هو) */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .container { background: #1e293b; width: 100%; max-width: 550px; padding: 25px; border-radius: 15px; border: 1px solid #334155; margin-bottom: 20px; display: none; }
        .container.active { display: block; }
        input { width: 100%; padding: 12px; border: 1px solid #334155; background: #0f172a; color: #fff; border-radius: 8px; font-size: 16px; text-align: center; margin-bottom: 15px; }
        button { color: #fff; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; width: 100%; margin-top: 10px; }
        .btn-primary { background: linear-gradient(45deg, #38bdf8, #0284c7); }
        .btn-ban { background: linear-gradient(45deg, #ea580c, #c2410c); }
        .btn-unban { background: linear-gradient(45deg, #06b6d4, #0891b2); }
    </style>
</head>
<body>
    <div id="login-screen" class="container active">
        <h3>تسجيل الدخول</h3>
        <input type="text" id="login-username" placeholder="اسم المستخدم">
        <input type="password" id="login-password" placeholder="كلمة المرور">
        <button class="btn-primary" onclick="handleLogin()">دخول للموقع 🚀</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBlbW15S2V5X0R1bW15X01haG1vdWQyMDI2",
            databaseURL: "https://game11-5dfa1-default-rtdb.firebaseio.com",
            projectId: "game11-5dfa1"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // 1. دالة بصمة الجهاز (الحماية الجديدة)
        function getDeviceFingerprint() {
            return "dev_" + btoa(window.navigator.userAgent + window.screen.width + window.screen.height);
        }

        // 2. تعديل دالة حظر اللاعب (Ban)
        function banUser() {
            const username = document.getElementById('friend-username').value.trim().toLowerCase();
            database.ref('users/' + username).once('value').then((snap) => {
                if (!snap.exists()) return alert("اللاعب غير موجود!");
                const fp = snap.val().device_fp || "unknown";
                database.ref('blacklisted_devices/' + fp).set({ username: username });
                database.ref('users/' + username).update({ status: 'banned' });
                alert("تم حظر اللاعب وجهازه نهائياً! 🚫");
            });
        }

        // 3. تعديل دالة فك الحظر (Unban)
        function unbanUser() {
            const username = document.getElementById('friend-username').value.trim().toLowerCase();
            database.ref('users/' + username).once('value').then((snap) => {
                if (!snap.exists()) return alert("اللاعب غير موجود!");
                const fp = snap.val().device_fp;
                database.ref('blacklisted_devices/' + fp).remove();
                database.ref('users/' + username).update({ status: 'offline' });
                alert("تم فك الحظر! 🔓");
            });
        }

        // 4. تعديل تسجيل الدخول (لفحص الحظر)
        function handleLogin() {
            const username = document.getElementById('login-username').value.trim().toLowerCase();
            const fp = getDeviceFingerprint();

            database.ref('blacklisted_devices/' + fp).once('value').then((snap) => {
                if (snap.exists()) {
                    alert("جهازك محظور نهائياً من الموقع! 🚫");
                    return;
                }
                // (هنا كمل باقي الكود الخاص بيك في تسجيل الدخول)
                // تأكد أنك بتحدث الـ device_fp في الفايربيز عند كل دخول
                database.ref('users/' + username).update({ device_fp: fp });
                // ... (باقي منطق الدخول بتاعك)
            });
        }

        // (ضع هنا باقي دوال الألعاب والمنطق الخاص بك كما هي بالظبط)
    </script>
</body>
</html>
