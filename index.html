<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مرحبا بك في موقعك اللذوذ 👑🎡</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #38bdf8; font-size: 28px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        .header p { color: #94a3b8; font-size: 14px; margin-top: 5px; }

        .container { background: #1e293b; width: 100%; max-width: 500px; padding: 30px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; display: none; }
        .container.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #334155; background: #0f172a; color: #fff; border-radius: 8px; font-size: 16px; text-align: center; }
        input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.3); }
        input:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; border-color: #334155; }

        .buttons-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        button { width: 100%; color: #fff; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: linear-gradient(45deg, #38bdf8, #0284c7); }
        .btn-success { background: linear-gradient(45deg, #10b981, #059669); }
        .btn-add { background: linear-gradient(45deg, #10b981, #059669); }
        .btn-deduct { background: linear-gradient(45deg, #ef4444, #dc2626); }
        button:hover { transform: translateY(-2px); opacity: 0.9; }

        .toggle-link { text-align: center; margin-top: 15px; color: #38bdf8; cursor: pointer; font-size: 14px; text-decoration: underline; }

        /* ستايل العجلة الدوارة (اللعبة) 🎡 */
        .wheel-box { display: flex; flex-direction: column; align-items: center; margin-top: 20px; position: relative; }
        .wheel-canvas { width: 260px; height: 260px; border-radius: 50%; border: 5px solid #38bdf8; background: #0f172a; transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1); box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
        .pointer { position: absolute; top: -10px; width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 25px solid #ef4444; z-index: 10; }
        .spin-btn { margin-top: 20px; background: linear-gradient(45deg, #ec4899, #8b5cf6); box-shadow: 0 4px 15px rgba(236, 72, 153, 0.4); }

        .user-card { background: linear-gradient(135deg, #1e293b, #0f172a); border: 2px solid #38bdf8; padding: 20px; border-radius: 15px; text-align: center; }
        .user-card .name { font-size: 18px; color: #94a3b8; }
        .user-card .balance { font-size: 32px; color: #10b981; font-weight: bold; margin-top: 5px; }

        /* جدول الأدمن */
        .balance-box { width: 100%; max-width: 650px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; padding: 20px; display: none; }
        .balance-box h3 { color: #38bdf8; text-align: center; margin-bottom: 15px; font-size: 18px; }
        
        .admin-table { width: 100%; border-collapse: collapse; text-align: center; background: #0f172a; font-size: 14px; }
        .admin-table th, .admin-table td { padding: 12px; border: 1px solid #1e293b; }
        .admin-table th { background-color: #1e293b; color: #38bdf8; }
        
        .status-online { color: #10b981; font-weight: bold; }
        .status-offline { color: #64748b; }

        .logout-btn { margin-top: 15px; background: #334155; padding: 8px; font-size: 13px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <h1>مرحبا بك في موقعك اللذوذ 👑🎡</h1>
        <p>سجل حسابك، لف العجلة واكسب فلوس حقيقية لايف!</p>
    </div>

    <div id="login-screen" class="container active">
        <h3 style="text-align: center; margin-bottom: 15px; color: #38bdf8;">تسجيل الدخول للعب</h3>
        <div class="form-group">
            <label>اسم المستخدم:</label>
            <input type="text" id="login-username" placeholder="اكتب اسمك هنا...">
        </div>
        <div class="form-group">
            <label>كلمة المرور:</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn-primary" onclick="handleLogin()">دخول للعبة 🚀</button>
        <div class="toggle-link" onclick="switchScreen('signup-screen')">عمل حساب جديد لأول مرة ✨</div>
    </div>

    <div id="signup-screen" class="container">
        <h3 style="text-align: center; margin-bottom: 15px; color: #10b981;">إنشاء حساب ألعاب جديد</h3>
        <div class="form-group">
            <label>اسم مستخدم جديد (بدون مسافات):</label>
            <input type="text" id="signup-username" placeholder="مثال: aboud_ff">
        </div>
        <div class="form-group">
            <label>كلمة مرور سريّة:</label>
            <input type="password" id="signup-password" placeholder="اكتب باسورد">
        </div>
        <button class="btn-success" onclick="handleSignUp()">تسجيل وحفظ البيانات 🛠️</button>
        <div class="toggle-link" onclick="switchScreen('login-screen')">عندك حساب؟ سجل دخولك</div>
    </div>

    <div id="admin-screen" class="container">
        <h2 style="color: #38bdf8; text-align: center; margin-bottom: 15px; font-size: 20px;">👑 لوحة الإدارة والتحكم بالأرصدة 👑</h2>
        <div class="form-group">
            <label>اسم حساب اللاعب:</label>
            <input type="text" id="friend-username" placeholder="مثال: hossam">
        </div>
        <div class="form-group">
            <label>المبلغ (جنيه):</label>
            <input type="number" id="money-amount" placeholder="اكتب العدد هنا">
        </div>
        <div class="buttons-zone">
            <button class="btn-add" onclick="addMoney()">إضافة رصيد ➕</button>
            <button class="btn-deduct" onclick="deductMoney()">خصم رصيد ➖</button>
        </div>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج ↩️</button>
    </div>

    <div id="user-screen" class="container">
        <div class="user-card">
            <div class="name">اللاعب: <span id="display-name" style="color: #38bdf8;"></span></div>
            <div class="balance" id="display-balance">0 جنيه</div>
        </div>

        <div class="wheel-box">
            <div class="pointer"></div>
            <canvas id="wheel" class="wheel-canvas" width="300" height="300"></canvas>
            <button class="spin-btn" id="spin-button" onclick="spinWheel()">لف العجلة (التكلفة: 10 جنيه) 🎡💸</button>
        </div>

        <button class="logout-btn" onclick="logout()">تسجيل الخروج ↩️</button>
    </div>

    <div id="admin-table-box" class="balance-box">
        <h3>بيانات حسابات اللاعبين والمراقبة الحية 📊</h3>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>المستخدم</th>
                    <th>الباسورد</th>
                    <th>الرصيد الحالي</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="users-list-tbody"></tbody>
        </table>
    </div>

    <script>
        // تكوين الـ Firebase الخاص بيك
        const firebaseConfig = {
            apiKey: "AIzaSyBlbW15S2V5X0R1bW15X01haG1vdWQyMDI2", 
            authDomain: "game11-5dfa1.firebaseapp.com",
            databaseURL: "https://game11-5dfa1-default-rtdb.firebaseio.com",
            projectId: "game11-5dfa1",
            storageBucket: "game11-5dfa1.appspot.com",
            messagingSenderId: "5839201948", 
            appId: "1:5839201948:web:73bdfa932e" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const ADMIN_USERNAME = "mahmoud"; 
        let currentUser = "";
        let userCurrentBalance = 0;
        let isSpinning = false;

        // داتا الجوائز وقيم زوايا العجلة
        const prizes = [0, 5, 20, 0, 50, 10, 0, 15]; 
        const colors = ["#1e293b", "#38bdf8", "#10b981", "#1e293b", "#f59e0b", "#8b5cf6", "#1e293b", "#ec4899"];

        window.onload = function() {
            drawWheel();
            const savedUser = localStorage.getItem('saved_username');
            if (savedUser) {
                document.getElementById('login-username').value = savedUser;
                document.getElementById('login-username').disabled = true;
                document.getElementById('login-password').focus();
            }
        };

        function switchScreen(screenId) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // رسم شكل عجلة الحظ
        function drawWheel() {
            const canvas = document.getElementById("wheel");
            const ctx = canvas.getContext("2d");
            const numSegments = prizes.length;
            const anglePerSegment = (2 * Math.PI) / numSegments;

            for (let i = 0; i < numSegments; i++) {
                ctx.beginPath();
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 145, i * anglePerSegment, (i + 1) * anglePerSegment);
                ctx.fillStyle = colors[i];
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(150, 150);
                ctx.rotate(i * anglePerSegment + anglePerSegment / 2);
                ctx.fillStyle = "#fff";
                ctx.font = "bold 16px Segoe UI";
                ctx.fillText(prizes[i] + " ج", 75, 5);
                ctx.restore();
            }
        }

        // لف العجلة والخصم والإضافة التلقائية
        function spinWheel() {
            if (isSpinning) return;
            if (userCurrentBalance < 10) return alert("رصيدك مش مكفي يسطا! اشحن من محمود الأدمن الأول 💸❌");

            isSpinning = true;
            const spinButton = document.getElementById("spin-button");
            spinButton.disabled = true;

            const tempBalance = userCurrentBalance - 10;
            database.ref('users/' + currentUser).update({ balance: tempBalance }).then(() => {
                
                const totalSegments = prizes.length;
                const randomSegment = Math.floor(Math.random() * totalSegments); 
                const degreesPerSegment = 360 / totalSegments;
                
                const targetRotation = 3600 + (randomSegment * degreesPerSegment); 
                const wheelCanvas = document.getElementById("wheel");
                wheelCanvas.style.transform = `rotate(${targetRotation}deg)`;

                setTimeout(() => {
                    wheelCanvas.style.transition = "none";
                    const actualAngle = targetRotation % 360;
                    wheelCanvas.style.transform = `rotate(${actualAngle}deg)`;
                    
                    const prizeIndex = (totalSegments - Math.floor(actualAngle / degreesPerSegment)) % totalSegments;
                    const wonAmount = prizes[prizeIndex];

                    const finalBalance = tempBalance + wonAmount;
                    database.ref('users/' + currentUser).update({ balance: finalBalance }).then(() => {
                        if (wonAmount > 0) {
                            alert(`مبروووك! 🎉 العجلة وقفت وجاتلك جائزة بقيمة ${wonAmount} جنيه! 💰🏆`);
                        } else {
                            alert("حظ أوفر المرة القادمة يسطا! وقفت على 0 جنيه 😶 حظك سكه.");
                        }
                        wheelCanvas.style.transition = "transform 4s cubic-bezier(0.1, 0.8, 0.3, 1)";
                        isSpinning = false;
                        spinButton.disabled = false;
                    });
                }, 4000);
            });
        }

        function setupPresence(username) {
            const userStatusRef = database.ref('users/' + username + '/status');
            database.ref('.info/connected').on('value', (snapshot) => {
                if (snapshot.val() == true) {
                    userStatusRef.onDisconnect().set('offline');
                    userStatusRef.set('online');
                }
            });
        }

        function handleSignUp() {
            const username = document.getElementById('signup-username').value.trim().toLowerCase();
            const password = document.getElementById('signup-password').value.trim();

            if (!username || !password) return alert("اكتب البيانات بالكامل! ⚠️");
            if (username.includes(" ")) return alert("الاسم ميبقاش فيه مسافات! ❌");

            database.ref('users/' + username).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    alert("اسم المستخدم مسجل بالفعل! ❌");
                } else {
                    database.ref('users/' + username).set({
                        username: username,
                        password: password,
                        balance: 5, 
                        status: 'offline'
                    }).then(() => {
                        alert("تم إنشاء حساب ألعاب جديد بنجاح! 🎉");
                        localStorage.setItem('saved_username', username);
                        location.reload(); 
                    });
                }
            });
        }

        function handleLogin() {
            const username = document.getElementById('login-username').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value.trim();

            if (!username || !password) return alert("اكتب الاسم والباسورد! ⚠️");

            database.ref('users/' + username).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    if (userData.password === password || (username === ADMIN_USERNAME && password === "admin123")) {
                        localStorage.setItem('saved_username', username);
                        currentUser = username;
                        setupPresence(username);

                        if (username === ADMIN_USERNAME) {
                            switchScreen('admin-screen');
                            document.getElementById('admin-table-box').style.display = 'block';
                            loadAdminTable();
                        } else {
                            switchScreen('user-screen');
                            document.getElementById('admin-table-box').style.display = 'none';
                            loadUserBalance(username);
                        }
                    } else {
                        alert("الباسورد غلط! 🤫");
                    }
                } else {
                    alert("الحساب غير موجود! سجل أولاً ↩️");
                }
            });
        }

        function loadAdminTable() {
            database.ref('users').on('value', (snapshot) => {
                const tbody = document.getElementById('users-list-tbody');
                tbody.innerHTML = "";
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    for (let key in data) {
                        const user = data[key];
                        const isOnline = user.status === 'online';
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="font-weight: bold;">👤 ${user.username}</td>
                            <td style="color: #f59e0b;">${user.password || '----'}</td>
                            <td style="color: #10b981; font-weight: bold;">${user.balance || 0} ج</td>
                            <td class="${isOnline ? 'status-online' : 'status-offline'}">${isOnline ? 'أونلاين 🟢' : 'أوفلاين ⚪'}</td>
                        `;
                        tbody.appendChild(tr);
                    }
                }
            });
        }

        function loadUserBalance(username) {
            document.getElementById('display-name').innerText = username;
            database.ref('users/' + username).on('value', (snapshot) => {
                if (snapshot.exists()) {
                    userCurrentBalance = snapshot.val().balance || 0;
                    document.getElementById('display-balance').innerText = userCurrentBalance + " جنيه";
                }
            });
        }

        function addMoney() {
            const username = document.getElementById('friend-username').value.trim().toLowerCase();
            const amount = parseFloat(document.getElementById('money-amount').value);
            if (!username || isNaN(amount) || amount <= 0) return alert("بيانات خاطئة!");

            database.ref('users/' + username).once('value').then((snapshot) => {
                let curBal = snapshot.exists() ? (snapshot.val().balance || 0) : 0;
                let curPass = snapshot.exists() ? (snapshot.val().password || "1234") : "1234";
                database.ref('users/' + username).update({
                    username: username, password: curPass, balance: curBal + amount, status: 'offline'
                }).then(() => { alert("تم الشحن! 🎉"); document.getElementById('money-amount').value = ""; });
            });
        }

        function deductMoney() {
            const username = document.getElementById('friend-username').value.trim().toLowerCase();
            const amount = parseFloat(document.getElementById('money-amount').value);
            if (!username || isNaN(amount) || amount <= 0) return alert("بيانات خاطئة!");

            database.ref('users/' + username).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const curBal = snapshot.val().balance || 0;
                    database.ref('users/' + username).update({ balance: curBal - amount }).then(() => {
                        alert("تم الخصم! 💸"); document.getElementById('money-amount').value = "";
                    });
                }
            });
        }

        function logout() {
            if(currentUser) database.ref('users/' + currentUser + '/status').set('offline');
            document.getElementById('login-password').value = "";
            document.getElementById('admin-table-box').style.display = 'none';
            switchScreen('login-screen');
            const savedUser = localStorage.getItem('saved_username');
            if (savedUser) {
                document.getElementById('login-username').value = savedUser;
                document.getElementById('login-username').disabled = true;
            }
        }
    </script>
</body>
</html>
