<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conan World - قهوة المصريين</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e0d0a, #3e2723);
            color: #fff;
            text-align: center;
            min-height: 100vh;
        }

        .screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .hidden { display: none !important; }

        .box, .daily-reward-box, .matchmaking-box, .admin-box {
            background: rgba(78, 52, 46, 0.95);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            border: 2px solid #ff9800;
            margin: 15px;
            max-width: 450px;
            width: 100%;
            box-sizing: border-box;
        }

        .admin-box {
            border: 2px solid #d32f2f;
            max-width: 600px;
        }

        h1 { color: #ff9800; }

        input {
            width: 90%;
            padding: 14px;
            margin: 12px 0;
            border-radius: 10px;
            border: 2px solid #8d6e63;
            font-size: 16px;
            background-color: #2e1c19;
            color: #fff;
            text-align: center;
        }

        button {
            width: 95%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: none;
            font-size: 18px;
            background: linear-gradient(90deg, #ff9800, #e65100);
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 800px;
            border-bottom: 2px solid #ff9800;
            padding-bottom: 15px;
        }

        .wallet {
            background: linear-gradient(90deg, #2e7d32, #4caf50);
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
        }

        .hands-container {
            display: flex;
            justify-content: space-around;
            width: 100%;
            max-width: 500px;
            margin: 30px 0;
        }

        .hand-wrapper {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 15px;
            width: 40%;
        }

        .hand { font-size: 70px; }
        .choices { display: flex; gap: 15px; }
        .choice-btn { font-size: 24px; padding: 15px; width: auto; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="box">
            <h1>☕ CONAN WORLD ☕</h1>
            <p>اكتب اسمك وادخل القهوة فوراً</p>
            <input type="text" id="username" placeholder="اكتب اسم المستخدم...">
            <button id="login-btn">دخول فوري 🚀</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen hidden">
        <header>
            <h2>⚔️ منور يا <span id="user-display" style="color:#ff9800;"></span> ⚔️</h2>
            <div class="wallet">🪙 <span id="balance-display">100</span> جنيه</div>
        </header>

        <main style="display: flex; flex-direction: column; align-items: center; width: 100%;">
            <div class="daily-reward-box">
                <h3>🎁 الهدية اليومية</h3>
                <button id="daily-btn">⚡ استلام الهدية</button>
            </div>

            <div class="matchmaking-box">
                <h3>🎮 تحدي طوبة - ورقة - مقص</h3>
                <button id="find-match-btn">🔥 ابحث عن لاعب</button>
            </div>

            <div id="admin-panel" class="admin-box hidden">
                <h3>👑 لوحة تحكم الأدمن</h3>
                <p>مرحباً بك يا معلم محمود</p>
            </div>
        </main>
    </div>

    <div id="game-screen" class="screen hidden">
        <h2>🔥 ساحة المعركة 🔥</h2>
        <div class="hands-container">
            <div class="hand-wrapper"><div>أنت</div><div class="hand" id="my-hand">⏳</div></div>
            <div class="hand-wrapper"><div>الخصم</div><div class="hand" id="opponent-hand">⏳</div></div>
        </div>
        <div id="game-controls">
            <div class="choices">
                <button class="choice-btn" onclick="playTurn('rock')">✊ طوبة</button>
                <button class="choice-btn" onclick="playTurn('paper')">✋ ورقة</button>
                <button class="choice-btn" onclick="playTurn('scissors')">✌️ مقص</button>
            </div>
        </div>
        <div id="result-display" class="hidden">
            <h1 id="winner-text"></h1>
            <button id="back-to-lobby">رجوع</button>
        </div>
    </div>

    <script>
        let balance = 100;
        let username = "";

        // دالة الدخول الفوري المباشر
        document.getElementById('login-btn').addEventListener('click', function() {
            const inputName = document.getElementById('username').value.trim();
            if (!inputName) {
                alert("اكتب اسمك الأول يا صاحبي");
                return;
            }

            username = inputName;
            document.getElementById('user-display').innerText = username;
            document.getElementById('balance-display').innerText = balance;

            // إخفاء شاشة الدخول وإظهار القهوة
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');

            // لو الأدمن محمود يفتح اللوحة
            if (username.toLowerCase() === 'mahmoud') {
                document.getElementById('admin-panel').classList.remove('hidden');
            }
        });

        // الهدية اليومية
        document.getElementById('daily-btn').addEventListener('click', function() {
            balance += 50;
            document.getElementById('balance-display').innerText = balance;
            alert("أخدت 50 جنيه هدية! 🪙");
        });

        // الانتقال لساحة اللعب
        document.getElementById('find-match-btn').addEventListener('click', function() {
            document.getElementById('lobby-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('my-hand').innerText = '⏳';
            document.getElementById('opponent-hand').innerText = '⏳';
            document.getElementById('game-controls').classList.remove('hidden');
            document.getElementById('result-display').classList.add('hidden');
        });

        // جولة اللعب
        window.playTurn = function(myChoice) {
            const choices = ['rock', 'paper', 'scissors'];
            const handEmojis = { rock: '✊', paper: '✋', scissors: '✌️' };
            const opponentChoice = choices[Math.floor(Math.random() * 3)];

            document.getElementById('my-hand').innerText = handEmojis[myChoice];
            document.getElementById('opponent-hand').innerText = handEmojis[opponentChoice];

            let result = "";
            if (myChoice === opponentChoice) {
                result = "⚔️ تعادل!";
            } else if (
                (myChoice === 'rock' && opponentChoice === 'scissors') ||
                (myChoice === 'paper' && opponentChoice === 'rock') ||
                (myChoice === 'scissors' && opponentChoice === 'paper')
            ) {
                result = "🎉 كسبت الماتش!";
                balance += 50;
            } else {
                result = "😢 خسرت الماتش!";
                balance -= 50;
            }

            document.getElementById('balance-display').innerText = balance;
            document.getElementById('winner-text').innerText = result;
            document.getElementById('game-controls').classList.add('hidden');
            document.getElementById('result-display').classList.remove('hidden');
        };

        // الرجوع للقهوة
        document.getElementById('back-to-lobby').addEventListener('click', function() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('lobby-screen').classList.remove('hidden');
        });
    </script>
</body>
</html>
