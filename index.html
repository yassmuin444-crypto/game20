<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البنك المركزي - لوحة التحكم الشاملة 👑💰</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { color: #38bdf8; font-size: 28px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        .header p { color: #94a3b8; font-size: 14px; margin-top: 5px; }

        .container { background: #1e293b; width: 100%; max-width: 500px; padding: 30px; border-radius: 15px; border: 1px solid #334155; box-shadow: 0 10px 25px rgba(0,0,0,0.3); margin-bottom: 20px; display: none; }
        .container.active { display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #94a3b8; font-weight: bold; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #334155; background: #0f172a; color: #fff; border-radius: 8px; font-size: 16px; text-align: center; }
        input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 8px rgba(56, 189, 248, 0.3); }
        input:disabled { background: #1e293b; color: #64748b; cursor: not-allowed; border-color: #334155; }

        .buttons-zone { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        button { width: 100%; color: #fff; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .btn-primary { background: linear-gradient(45deg, #38bdf8, #0284c7); }
        .btn-success { background: linear-gradient(45deg, #10b981, #059669); }
        .btn-add { background: linear-gradient(45deg, #10b981, #059669); }
        .btn-deduct { background: linear-gradient(45deg, #ef4444, #dc2626); }
        button:hover { transform: translateY(-2px); opacity: 0.9; }

        .toggle-link { text-align: center; margin-top: 15px; color: #38bdf8; cursor: pointer; font-size: 14px; text-decoration: underline; }

        /* كارت رصيد المستخدم العادي */
        .user-card { background: linear-gradient(135deg, #1e293b, #0f172a); border: 2px solid #38bdf8; padding: 25px; border-radius: 15px; text-align: center; }
        .user-card .name { font-size: 20px; color: #94a3b8; }
        .user-card .balance { font-size: 36px; color: #10b981; font-weight: bold; margin-top: 10px; }

        /* جدول عرض الحسابات الاحترافي للأدمن */
        .balance-box { width: 100%; max-width: 650px; background: #1e293b; border-radius: 12px; border: 1px solid #334155; padding: 20px; display: none; }
        .balance-box h3 { color: #38bdf8; text-align: center; margin-bottom: 15px; font-size: 18px; }
        
        .admin-table { width: 100%; border-collapse: collapse; text-align: center; background: #0f172a; border-radius: 8px; overflow: hidden; font-size: 14px; }
        .admin-table th, .admin-table td { padding: 12px; border: 1px solid #1e293b; }
        .admin-table th { background-color: #1e293b; color: #38bdf8; font-weight: bold; }
        
        /* ألوان الحالات أونلاين وأوفلاين */
        .status-online { color: #10b981; font-weight: bold; text-shadow: 0 0 5px rgba(16,185,129,0.3); }
        .status-offline { color: #64748b; }

        .logout-btn { margin-top: 15px; background: #334155; padding: 8px; font-size: 13px; width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <h1>البنك المركزي 👑💰</h1>
        <p>نظام الإدارة الشامل مع ميزة مراقبة المتصلين لايف</p>
    </div>

    <div id="login-screen" class="container active">
        <h3 style="text-align: center; margin-bottom: 15px; color: #38bdf8;">تسجيل الدخول</h3>
        <div class="form-group">
            <label>اسم المستخدم:</label>
            <input type="text" id="login-username" placeholder="اكتب اسمك هنا...">
        </div>
        <div class="form-group">
            <label>كلمة المرور (الباسورد):</label>
            <input type="password" id="login-password" placeholder="••••••••">
        </div>
        <button class="btn-primary" onclick="handleLogin()">دخول 🚀</button>
        <div class="toggle-link" onclick="switchScreen('signup-screen')">إنشاء حساب جديد (لأول مرة) ✨</div>
    </div>

    <div id="signup-screen" class="container">
        <h3 style="text-align: center; margin-bottom: 15px; color: #10b981;">إنشاء حساب جديد</h3>
        <div class="form-group">
            <label>اختر اسم مستخدم (بدون مسافات):</label>
            <input type="text" id="signup-username" placeholder="مثال: aboud_55">
        </div>
        <div class="form-group">
            <label>اختر كلمة مرور سريّة:</label>
            <input type="password" id="signup-password" placeholder="اكتب باسورد قوي">
        </div>
        <button class="btn-success" onclick="handleSignUp()">تسجيل الحساب وحفظه 🛠️</button>
        <div class="toggle-link" onclick="switchScreen('login-screen')">لديك حساب بالفعل؟ سجل دخولك</div>
    </div>

    <div id="admin-screen" class="container">
        <h2 style="color: #38bdf8; text-align: center; margin-bottom: 15px; font-size: 20px;">👑 لوحة تحكم الإدارة العليا 👑</h2>
        <div class="form-group">
            <label>اسم حساب صاحبك المراد تعديله:</label>
            <input type="text" id="friend-username" placeholder="مثال: hossam_10">
        </div>
        <div class="form-group">
            <label>المبلغ (جنيه):</label>
            <input type="number" id="money-amount" placeholder="اكتب العدد هنا">
        </div>
        <div class="buttons-zone">
            <button class="btn-add" onclick="addMoney()">إضافة رصيد ➕</button>
            <button class="btn-deduct" onclick="deductMoney()">خصم رصيد ➖</button>
        </div>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج ↩️</button>
    </div>

    <div id="user-screen" class="container">
        <div class="user-card">
            <div class="name">أهلاً بك: <span id="display-name" style="color: #38bdf8;"></span></div>
            <div class="balance" id="display-balance">0 جنيه</div>
        </div>
        <button class="logout-btn" onclick="logout()">تسجيل الخروج ↩️</button>
    </div>

    <div id="admin-table-box" class="balance-box">
        <h3>بيانات الحسابات والمراقبة الحية 📊</h3>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>المستخدم</th>
                    <th>الباسورد</th>
                    <th>الرصيد</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="users-list-tbody">
                </tbody>
        </table>
    </div>

    <script>
        // تكوين الـ Firebase الخاص بيك
        const firebaseConfig = {
            apiKey: "AIzaSyBlbW15S2V5X0R1bW15X01haG1vdWQyMDI2", 
            authDomain: "game11-5dfa1.firebaseapp.com",
            databaseURL: "https://game11-5dfa1-default-rtdb.firebaseio.com",
            projectId: "game11-5dfa1",
            storageBucket: "game11-5dfa1.appspot.com",
            messagingSenderId: "5839201948", 
            appId: "1:5839201948:web:73bdfa932e" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // اسم حساب الأدمن السري الخاص بك
        const ADMIN_USERNAME = "mahmoud"; 
        let currentUser = "";

        // تفعيل ميزة حفظ الحساب تلقائياً في المتصفح عند التحميل
        window.onload = function() {
            const savedUser = localStorage.getItem('saved_username');
            if (savedUser) {
                document.getElementById('login-username').value = savedUser;
                document.getElementById('login-username').disabled = true;
                document.getElementById('login-password').focus();
            }
        };

        function switchScreen(screenId) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // تحديث حالة الاتصال أونلاين وأوفلاين سحرياً
        function setupPresence(username) {
            const userStatusRef = database.ref('users/' + username + '/status');
            
            // أول ما الفايربيز يلقط اتصال، يغير الحالة لـ online
            database.ref('.info/connected').on('value', (snapshot) => {
                if (snapshot.val() == true) {
                    // السطر ده بيقول للفايربيز: "أول ما المستخدم ده يقفل المتصفح أو يفصل نت، حول حالته لـ offline أوتوماتيك"
                    userStatusRef.onDisconnect().set('offline');
                    // حالياً هو فاتح، خليها online
                    userStatusRef.set('online');
                }
            });
        }

        // إنشاء حساب جديد
        function handleSignUp() {
            const username = document.getElementById('signup-username').value.trim().toLowerCase();
            const password = document.getElementById('signup-password').value.trim();

            if (!username || !password) return alert("اكتب الاسم والباسورد بتوعك الأول! ⚠️");
            if (username.includes(" ")) return alert("اسم المستخدم ميبقاش فيه مسافات يسطا! ❌");

            database.ref('users/' + username).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    alert("اسم المستخدم مسجل بالفعل! ❌ اختار اسم تاني.");
                } else {
                    database.ref('users/' + username).set({
                        username: username,
                        password: password,
                        balance: 0,
                        status: 'offline'
                    }).then(() => {
                        alert("تم إنشاء حسابك بنجاح! 🎉 سجل دخولك الآن.");
                        localStorage.setItem('saved_username', username);
                        location.reload(); 
                    });
                }
            });
        }

        // تسجيل الدخول
        function handleLogin() {
            const username = document.getElementById('login-username').value.trim().toLowerCase();
            const password = document.getElementById('login-password').value.trim();

            if (!username || !password) return alert("اكتب الاسم والباسورد عشان تدخل! ⚠️");

            database.ref('users/' + username).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    if (userData.password === password || (username === ADMIN_USERNAME && password === "admin123")) {
                        
                        localStorage.setItem('saved_username', username);
                        currentUser = username;
                        
                        // تفعيل ميزة مراقبة حالة الاتصال للحساب اللي فتح
                        setupPresence(username);

                        if (username === ADMIN_USERNAME) {
                            switchScreen('admin-screen');
                            document.getElementById('admin-table-box').style.display = 'block';
                            loadAdminTable();
                        } else {
                            switchScreen('user-screen');
                            document.getElementById('admin-table-box').style.display = 'none';
                            loadUserBalance(username);
                        }
                    } else {
                        alert("الباسورد غلط يا معلم! 🤫");
                    }
                } else {
                    alert("الاسم ده مش مسجل عندنا اصلاً! ↩️");
                }
            });
        }

        // 📊 للأدمن: سحب كل معلومات الناس (الاسم، الباسورد، الرصيد، الحالة أونلاين/أوفلاين)
        function loadAdminTable() {
            database.ref('users').on('value', (snapshot) => {
                const tbody = document.getElementById('users-list-tbody');
                tbody.innerHTML = "";
                if (snapshot.exists()) {
                    const data = snapshot.val();
                    for (let key in data) {
                        const user = data[key];
                        
                        // تحديد شكل وتكست الحالة أونلاين أو أوفلاين
                        const isOnline = user.status === 'online';
                        const statusClass = isOnline ? 'status-online' : 'status-offline';
                        const statusText = isOnline ? 'متصل الآن 🟢' : 'غير متصل ⚪';

                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td style="font-weight: bold;">👤 ${user.username}</td>
                            <td style="color: #f59e0b; font-family: monospace;">${user.password || '----'}</td>
                            <td style="color: #10b981; font-weight: bold;">${user.balance || 0} ج</td>
                            <td class="${statusClass}">${statusText}</td>
                        `;
                        tbody.appendChild(tr);
                    }
                }
            });
        }

        // للمستخدم العادي
        function loadUserBalance(username) {
            document.getElementById('display-name').innerText = username;
            database.ref('users/' + username).on('value', (snapshot) => {
                if (snapshot.exists()) {
                    document.getElementById('display-balance').innerText = (snapshot.val().balance || 0) + " جنيه";
                }
            });
        }

        // إضافة الرصيد
        function addMoney() {
            const username = document.getElementById('friend-username').value.trim().toLowerCase();
            const amount = parseFloat(document.getElementById('money-amount').value);

            if (!username || isNaN(amount) || amount <= 0) return alert("أدخل بيانات صحيحة! ⚠️");

            database.ref('users/' + username).once('value').then((snapshot) => {
                let currentBalance = 0;
                let userPass = "1234";
                let currentStatus = "offline";
                if (snapshot.exists()) {
                    currentBalance = snapshot.val().balance || 0;
                    userPass = snapshot.val().password || "1234";
                    currentStatus = snapshot.val().status || "offline";
                }
                
                database.ref('users/' + username).update({
                    username: username,
                    password: userPass,
                    balance: currentBalance + amount,
                    status: currentStatus
                }).then(() => {
                    alert(`تمت إضافة ${amount} جنيه لـ ${username} 🎉`);
                    document.getElementById('money-amount').value = "";
                });
            });
        }

        // خصم الرصيد
        function deductMoney() {
            const username = document.getElementById('friend-username').value.trim().toLowerCase();
            const amount = parseFloat(document.getElementById('money-amount').value);

            if (!username || isNaN(amount) || amount <= 0) return alert("أدخل بيانات صحيحة! ⚠️");

            database.ref('users/' + username).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const currentBalance = snapshot.val().balance || 0;
                    database.ref('users/' + username).update({
                        balance: currentBalance - amount
                    }).then(() => {
                        alert(`تم خصم ${amount} جنيه من ${username} 💸`);
                        document.getElementById('money-amount').value = "";
                    });
                } else {
                    alert("المستخدم غير موجود! ❌");
                }
            });
        }

        // تسجيل خروج
        function logout() {
            // تحويل حالته لأوفلاين يدوياً في الداتا بيس عند الضغط على تسجيل الخروج
            if(currentUser) {
                database.ref('users/' + currentUser + '/status').set('offline');
            }
            
            document.getElementById('login-password').value = "";
            document.getElementById('admin-table-box').style.display = 'none';
            switchScreen('login-screen');
            
            const savedUser = localStorage.getItem('saved_username');
            if (savedUser) {
                document.getElementById('login-username').value = savedUser;
                document.getElementById('login-username').disabled = true;
            }
        }
    </script>
</body>
</html>
